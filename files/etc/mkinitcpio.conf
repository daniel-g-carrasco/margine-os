# vim:set ft=sh:
# Keep basic laptop pointer input available in recovery boots. Old read-only
# Btrfs snapshots can contain stale /usr/lib/modules for the current kernel.
MODULES=(i2c_hid_acpi i2c_hid hid_multitouch)
BINARIES=()
FILES=()
HOOKS=(base systemd plymouth autodetect microcode modconf kms keyboard sd-vconsole block sd-encrypt filesystems fsck)
