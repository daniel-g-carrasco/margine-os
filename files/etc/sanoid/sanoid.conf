# Managed by Margine.
#
# This baseline is designed for the first non-root ZFS adoption cycle:
# - local automatic snapshots
# - simple retention
# - no replication assumptions
#
# Operators should only enable datasets that already exist.

[template_production]
        frequently = 0
        hourly = 24
        daily = 14
        weekly = 0
        monthly = 3
        yearly = 0
        autosnap = yes
        autoprune = yes

[template_archive]
        frequently = 0
        hourly = 0
        daily = 7
        weekly = 0
        monthly = 6
        yearly = 0
        autosnap = yes
        autoprune = yes

[template_pre_mutation_only]
        frequently = 0
        hourly = 0
        daily = 0
        weekly = 0
        monthly = 0
        yearly = 0
        autosnap = no
        autoprune = no

[tank/data]
        use_template = production

[tank/archive]
        use_template = archive

[tank/srv]
        use_template = production

[tank/vm]
        use_template = pre_mutation_only

[tank/machines]
        use_template = pre_mutation_only

[tank/containers]
        use_template = pre_mutation_only
