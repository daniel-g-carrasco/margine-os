# Hyprlauncher behavior and window sizing
#
# Use this file for launcher UX only: focus policy, caching, default finder, and
# window size. Launch hotkeys stay in `conf.d/60-binds-apps.conf`.
#
# Wiki topic:
#   https://wiki.hypr.land/Hypr-Ecosystem/hyprlauncher/

general {
    # Grab focus immediately so typing lands in the launcher without extra clicks.
    grab_focus = true
}

cache {
    # Keep cache enabled to avoid rescanning desktop entries on every open.
    enabled = true
}

finders {
    # Desktop launcher remains the default entry mode for this setup.
    default_finder = desktop
    # Include desktop file icons in the grid/list picker.
    desktop_icons = true
}

ui {
    # Keep the launcher compact enough for laptop screens while still readable.
    window_size = 520 360
}
