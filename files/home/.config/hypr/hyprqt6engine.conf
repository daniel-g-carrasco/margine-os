# Generated from ~/.config/margine/theme.env
theme {
    color_scheme = $HOME/.config/qt6ct/colors/margine.conf
    icon_theme = Adwaita-yellow
    style = Fusion
    font = IBM Plex Sans
    font_size = 10
    font_fixed = IBM Plex Mono
    font_fixed_size = 10
}

misc {
    single_click_activate = 1
    menus_have_icons = 1
    shortcuts_for_context_menus = 1
}
