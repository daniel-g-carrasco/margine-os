# hypridle policy for dim, lock, DPMS-off, and suspend
#
# Timeouts are in seconds and should stay ordered from least destructive to
# most destructive:
# 1. dim
# 2. lock
# 3. turn displays off
# 4. suspend
#
# If you change one timeout, re-check the spacing between the next stages.
# In particular:
# - dim should happen before lock
# - DPMS off should happen after lock
# - suspend should not race with lock or DPMS transitions
#
# Wiki topic:
#   https://wiki.hypr.land/hyprland-wiki/pages/Hypr-Ecosystem/hypridle

general {
    # D-Bus "lock session" events should prefer the Margine lock wrapper.
    lock_cmd = pidof margine-hyprlock || ~/.local/bin/margine-hyprlock

    # Before suspend, rely on logind locking so secrets are not left visible.
    before_sleep_cmd = loginctl lock-session

    # On resume, ensure displays are turned back on even if they were powered
    # down by the idle listeners.
    after_sleep_cmd = hyprctl dispatch dpms on

    # Respect application inhibitors by default.
    ignore_dbus_inhibit = false
}

# Stage 1: dim the internal panel after 4 minutes to shave some idle drain.
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Stage 2: lock the session after 5 minutes.
listener {
    timeout = 300
    on-timeout = pidof margine-hyprlock || ~/.local/bin/margine-hyprlock
}

# Stage 3: turn displays off shortly after locking.
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Stage 4: suspend after 30 minutes idle.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
