general {
    lock_cmd = pidof margine-hyprlock || margine-hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim the internal panel after 4 minutes to shave some idle drain.
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Lock the session after 5 minutes.
listener {
    timeout = 300
    on-timeout = pidof margine-hyprlock || margine-hyprlock
}

# Turn displays off shortly after locking.
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes idle.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
