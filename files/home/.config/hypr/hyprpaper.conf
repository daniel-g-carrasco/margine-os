# Hyprpaper wallpaper baseline
#
# This file stays intentionally minimal.
# Use it for the static wallpaper source of truth, not for per-session logic.
# The launcher script `~/.local/bin/launch-hyprpaper` owns how the daemon is
# started or restarted.
#
# Wiki topic:
#   https://wiki.hypr.land/Hypr-Ecosystem/hyprpaper/

splash = false

# Global fallback wallpaper. If per-monitor wallpapers are added later, keep
# explicit monitor-targeted blocks above any generic fallback.
wallpaper {
    monitor =
    path = /usr/share/margine/wallpapers/default.jpg
    fit_mode = cover
}
