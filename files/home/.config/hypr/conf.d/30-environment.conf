# Environment, cursor size, and Xwayland behavior
#
# Use `env = KEY,VALUE` for per-session environment variables inherited by
# processes launched by Hyprland.
#
# Wiki topics:
#   https://wiki.hypr.land/Configuring/Environment-variables/
#   https://wiki.hypr.land/Configuring/XWayland/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

xwayland {
    force_zero_scaling = true
}
