# Layer rules, window rules, and placement notes
#
# Keep control-center animation on the normal layer path.
# Disable compositor-level animation only for transient popup notifications.
layerrule = no_anim on, match:namespace ^swaync-notification-window$

# Workspace placement is handled dynamically at login:
# - dual monitor: workspace 1 on DP-11, workspace 2 on eDP-1
# - laptop only: workspace 1 on eDP-1

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
