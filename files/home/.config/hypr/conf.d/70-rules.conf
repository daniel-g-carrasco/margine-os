# Layer rules, window rules, and placement notes
#
# This file is the right place for:
# - layerrule on bars, notifications, overlays
# - windowrule and windowrulev2 style behavior
# - placement policy that should stay close to the compositor, not to app launch
#
# Keep control-center animation on the normal layer path.
# Disable compositor-level animation only for transient popup notifications.
layerrule = no_anim on, match:namespace ^swaync-notification-window$

# Workspace placement is handled dynamically at login:
# - dual monitor: workspace 1 on DP-11, workspace 2 on eDP-1
# - laptop only: workspace 1 on eDP-1

windowrule {
    name = suppress-maximize-events
    match:class = .*

    # Prevent toolkit maximize events from fighting the tiled layout policy.
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    # Avoid transient XWayland drag helper windows stealing focus.
    no_focus = true
}

windowrule {
    name = reaper-opaque-xwayland
    match:class = ^(REAPER|reaper)$
    match:xwayland = true

    # REAPER exposes tooltips as transient XWayland windows. If those helpers
    # take compositor focus, the global inactive opacity makes the real editor
    # look dimmed and can make tooltip rendering artifacts harder to read.
    opacity = 1.0 1.0
}

windowrule {
    name = float-modal-dialogs
    match:modal = true
    match:fullscreen = false

    # Toolkit dialogs are designed around their own minimum content size.
    float = yes
    center = yes
}

windowrule {
    name = float-file-dialogs
    match:title = ^(Open|Save|Select|Choose|File Upload|Apri|Salva|Seleziona|Scegli).*$
    match:fullscreen = false

    float = yes
    center = yes
    min_size = 760 520
}

windowrule {
    name = float-network-editor
    match:class = ^(nm-connection-editor|org\.gnome\.nm-connection-editor)$
    match:fullscreen = false

    float = yes
    center = yes
    min_size = 760 520
}

windowrule {
    name = float-virtual-machine-viewers
    match:class = ^(qemu|qemu-system-.*|virt-manager|virt-viewer|remote-viewer|org\.virt_manager\.virt-manager)$
    match:fullscreen = false

    float = yes
    center = yes
    min_size = 960 640
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
