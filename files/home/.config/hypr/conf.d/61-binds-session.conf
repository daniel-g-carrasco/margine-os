# Session control and explicit power actions
#
# Keep destructive actions obvious and grouped together.
# If this section changes, revisit the desktop launchers that trigger the same
# backends so keyboard and launcher behavior stay aligned.

bind = $mainMod, ESCAPE, exec, command -v wlogout >/dev/null 2>&1 && wlogout || command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod CTRL, L, exec, command -v ~/.local/bin/margine-hyprlock >/dev/null 2>&1 && ~/.local/bin/margine-hyprlock || loginctl lock-session
