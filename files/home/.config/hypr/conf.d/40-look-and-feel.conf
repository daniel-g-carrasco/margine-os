# Core compositor appearance and layout tuning
#
# Wiki topics:
#   https://wiki.hypr.land/Configuring/Variables/
#   https://wiki.hypr.land/Configuring/Animations/
#
# Practical rule:
# - `general` controls gaps, borders, layout choice
# - `decoration` controls opacity, blur, shadows
# - `animations` controls curve definitions and per-event animation behavior
# - `dwindle` / `master` keep layout-specific defaults ready
#
# Change guide:
# - if the desktop feels too dense or too loose, start with `gaps_in/out`
# - if readability is the issue, inspect border and opacity before blur
# - if motion is the issue, tune `animations` before removing them entirely

general {
    gaps_in = 3
    gaps_out = 6

    border_size = 2

    col.active_border = rgba(234,231,219,0.87)
    col.inactive_border = rgba(66,58,62,0.8)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

# Dwindle is the active layout today.
# Keep layout-specific defaults here instead of burying them in `general`.
dwindle {
    pseudotile = true
    preserve_split = true
}

# Master is kept configured so layout switching does not drop into unknown state.
master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = false
    vrr = 2
}
