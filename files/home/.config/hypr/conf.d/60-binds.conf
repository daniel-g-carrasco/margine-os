# Unified Hyprland binds
#
# All keyboard, mouse, workspace, screenshot, and media binds live here on
# purpose. The user requested a single bind file instead of multiple themed
# fragments.
#
# Navigation within this file:
# - daily use: apps and operator helpers
# - workspaces
# - window management and layout
# - screenshots / media / hardware keys
# - session and destructive actions
#
# Wiki topics:
#   https://wiki.hypr.land/Configuring/Binds/
#   https://wiki.hypr.land/Configuring/Dispatchers/
#
# Use `bindd` for keyboard actions whenever possible so `hyprctl binds` becomes
# a readable operator index. Keep `bindm`, `bindel`, and `bindl` only where
# their specific behavior is required.

# App launchers and operator helpers
#
# Patterns worth remembering:
#   bindd = $mainMod, RETURN, Open terminal, exec, $terminal
#   bindd = $mainMod SHIFT, RETURN, Open browser, exec, $browser

# Launcher entrypoints
bindd = $mainMod, SPACE, Open launcher, exec, $menu
bindd = $mainMod, R, Open launcher, exec, $menu
bindd = $mainMod ALT, SPACE, Open launcher alternative chord, exec, $menu
bindd = $mainMod CTRL, SPACE, Open Walker secondary launcher, exec, $menuwalker

# Primary apps
bindd = $mainMod, RETURN, Open terminal, exec, $terminal
bindd = $mainMod SHIFT, RETURN, Open browser, exec, $browser
bindd = $mainMod SHIFT, P, Restart waybar, exec, ~/.config/waybar/launch.sh
bindd = $mainMod SHIFT, F, Open file manager, exec, $fileManager

# Operator helpers
bindd = $mainMod CTRL, T, Open btop in terminal, exec, $terminal -e btop
bindd = $mainMod, K, Show Hyprland binds, exec, $terminal -e sh -lc 'hyprctl binds | less -R'
bindd = $mainMod, N, Toggle notifications center, exec, command -v swaync-client >/dev/null 2>&1 && swaync-client -t -sw

# Workspace navigation, numeric workspace jumps, and scratchpad
#
# Keep numeric jump and move pairs visually grouped. This section is early on
# purpose because workspace movement is part of normal daily navigation.

# Cycle and previous-workspace navigation
bindd = $mainMod, TAB, Go to next workspace, workspace, e+1
bindd = $mainMod SHIFT, TAB, Go to previous workspace, workspace, e-1
bindd = $mainMod CTRL, TAB, Return to previous workspace, workspace, previous

# Direct workspace jump
bindd = $mainMod, 1, Go to workspace 1, workspace, 1
bindd = $mainMod, 2, Go to workspace 2, workspace, 2
bindd = $mainMod, 3, Go to workspace 3, workspace, 3
bindd = $mainMod, 4, Go to workspace 4, workspace, 4
bindd = $mainMod, 5, Go to workspace 5, workspace, 5
bindd = $mainMod, 6, Go to workspace 6, workspace, 6
bindd = $mainMod, 7, Go to workspace 7, workspace, 7
bindd = $mainMod, 8, Go to workspace 8, workspace, 8
bindd = $mainMod, 9, Go to workspace 9, workspace, 9
bindd = $mainMod, 0, Go to workspace 10, workspace, 10

# Move active window to workspace
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Scratchpad / special workspace
bindd = $mainMod, S, Toggle scratchpad workspace, togglespecialworkspace, magic
bindd = $mainMod ALT, S, Send window to scratchpad workspace, movetoworkspace, special:magic

# Window management, layout actions, grouping, mouse-driven resize/move
#
# Use this section for window movement and layout control, not for launching
# apps.

# Single-window actions
bindd = $mainMod, W, Close active window, killactive,
bindd = $mainMod, T, Toggle floating mode, togglefloating,
bindd = $mainMod, O, Pin active window, pin,
bindd = $mainMod, F, Toggle fullscreen, fullscreen, 0
bindd = $mainMod, P, Toggle pseudotile, pseudo,
bindd = $mainMod, J, Toggle split orientation, layoutmsg, togglesplit

# Focus movement
bindd = $mainMod, left, Focus window left, movefocus, l
bindd = $mainMod, right, Focus window right, movefocus, r
bindd = $mainMod, up, Focus window up, movefocus, u
bindd = $mainMod, down, Focus window down, movefocus, d

# Swap windows in the current layout tree
bindd = $mainMod SHIFT, left, Swap window left, swapwindow, l
bindd = $mainMod SHIFT, right, Swap window right, swapwindow, r
bindd = $mainMod SHIFT, up, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, down, Swap window down, swapwindow, d

# Fine resize
bindd = $mainMod, equal, Grow window width, resizeactive, 40 0
bindd = $mainMod, minus, Shrink window width, resizeactive, -40 0
bindd = $mainMod SHIFT, equal, Grow window height, resizeactive, 0 40
bindd = $mainMod SHIFT, minus, Shrink window height, resizeactive, 0 -40

# Grouping
bindd = $mainMod, G, Toggle group on active window, togglegroup,
bindd = $mainMod ALT, G, Move window out of group, moveoutofgroup,
bindd = $mainMod ALT, TAB, Focus next window in group, changegroupactive, f
bindd = $mainMod ALT SHIFT, TAB, Focus previous window in group, changegroupactive, b
bindd = $mainMod ALT, left, Move window into group left, moveintogroup, l
bindd = $mainMod ALT, right, Move window into group right, moveintogroup, r
bindd = $mainMod ALT, up, Move window into group up, moveintogroup, u
bindd = $mainMod ALT, down, Move window into group down, moveintogroup, d

# Mouse workspace cycle and move/resize on modifier-drag
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots, recording, volume, brightness, and media keys
#
# Keep these below daily navigation but above destructive actions.
# `bindel` is used for repeatable hardware keys such as volume/brightness.
# `bindl` is used for media keys that should still work when the session is
# locked.
# Screenshot and recording menus go through the Margine picker helper:
# Fuzzel first, Walker as a last-resort fallback.

# Screenshot and recording
bindd = , Print, Screenshot menu, exec, XDG_PICTURES_DIR="$HOME/Immagini" ~/.local/bin/screenshot-menu
bindd = SHIFT, Print, Screenshot region, exec, XDG_PICTURES_DIR="$HOME/Immagini" ~/.local/bin/screenshot-menu region
bindd = CTRL, Print, Screenshot active window, exec, XDG_PICTURES_DIR="$HOME/Immagini" ~/.local/bin/screenshot-menu window:active
bindd = SUPER, Print, Open recording menu, exec, ~/.local/bin/screenrecord-menu
bindd = SUPER SHIFT, Print, Start region recording directly, exec, ~/.local/bin/screenrecord-region-toggle --start

# Repeatable hardware keys
bindel = ,XF86AudioRaiseVolume, exec, ~/.local/bin/volume-osd up
bindel = ,XF86AudioLowerVolume, exec, ~/.local/bin/volume-osd down
bindel = ,XF86AudioMute, exec, ~/.local/bin/volume-osd mute
bindel = ,XF86AudioMicMute, exec, ~/.local/bin/volume-osd mic-mute
bindel = ,XF86MonBrightnessUp, exec, ~/.local/bin/brightness-osd up
bindel = ,XF86MonBrightnessDown, exec, ~/.local/bin/brightness-osd down

# Locked media keys
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Session control and explicit power actions
#
# Keep destructive actions obvious and grouped at the end of the file.
# If this section changes, revisit the desktop launchers that trigger the same
# backends so keyboard and launcher behavior stay aligned.
#
# Current policy:
# - SUPER+ESCAPE opens a session/power frontend if available
# - SUPER+CTRL+L always prefers the Margine lock wrapper
# - if a backend is missing, fail safe rather than inventing hidden behavior

bindd = $mainMod, ESCAPE, Open session actions frontend, exec, command -v wlogout >/dev/null 2>&1 && wlogout || command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = $mainMod CTRL, L, Lock screen, exec, command -v ~/.local/bin/margine-hyprlock >/dev/null 2>&1 && ~/.local/bin/margine-hyprlock || loginctl lock-session
