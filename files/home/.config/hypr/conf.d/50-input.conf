# Input devices, touchpad behavior, gestures, and per-device overrides
#
# Wiki topics:
#   https://wiki.hypr.land/Configuring/Variables/#input
#   https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
#
# Practical rule:
# - keep session-wide keyboard/pointer defaults in `input`
# - keep hardware-specific overrides in `device`
# - use `hyprctl devices` to discover the exact device names to match
#
# Useful commands:
# - `hyprctl devices` shows the names to use in `device { name = ... }`
# - `hyprctl getoption input:follow_mouse` is useful when debugging live state

input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    resolve_binds_by_sym = true
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 0.3
        tap-to-click = true
        clickfinger_behavior = true
    }
}

# Gesture syntax is:
#   gesture = <fingers>, <direction>, <action>
# Keep gesture comments close to the actual bind so the file stays operable.
# Swipe three fingers horizontally to change workspace.
gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
