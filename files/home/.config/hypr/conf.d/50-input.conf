# Input devices, touchpad behavior, gestures, and per-device overrides
#
# Wiki topics:
#   https://wiki.hypr.land/Configuring/Variables/#input
#   https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
#
# Practical rule:
# - keep session-wide keyboard/pointer defaults in `input`
# - keep hardware-specific overrides in `device`
# - use `hyprctl devices` to discover the exact device names to match
#
# Useful commands:
# - `hyprctl devices` shows the names to use in `device { name = ... }`
# - `hyprctl getoption input:follow_mouse` is useful when debugging live state

input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    resolve_binds_by_sym = true
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        # Touchpad scroll speed is managed by Wayland Scroll Factor (WSF).
        #
        # Hyprland exposes one native `scroll_factor` for touchpad scrolling,
        # shared by vertical and horizontal axes. WSF is the user-facing source
        # of truth for the scroll directions and gesture modes supported by the
        # active backend; on Hyprland it writes the native touchpad factor live
        # via:
        #
        #   wsf set 0.3
        #   wsf apply
        #
        # Keep the static Hyprland value commented out so `hyprctl reload` or a
        # new login does not overwrite the value chosen in WSF/WSF GUI.
        #
        # scroll_factor = 0.3
        tap-to-click = true
        clickfinger_behavior = true
    }
}

# Gesture syntax is:
#   gesture = <fingers>, <direction>, <action>
# Keep gesture comments close to the actual bind so the file stays operable.
# Swipe three fingers horizontally to change workspace.
gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
