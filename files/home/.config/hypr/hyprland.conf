# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$fileManager = nautilus
$menu = ~/.local/bin/margine-launcher
$menusvc = ~/.local/bin/margine-launcher-service
$browser = firefox

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = ~/.local/bin/margine-import-session-environment
exec-once = ~/.local/bin/margine-apply-desktop-defaults
exec-once = $menusvc
exec-once = command -v hyprlauncher >/dev/null 2>&1 && hyprlauncher --daemon
exec-once = hyprlock
exec-once = ~/.local/bin/hypr-workspace-layout
exec-once = ~/.config/waybar/launch.sh
exec-once = command -v swaync >/dev/null 2>&1 && ~/.config/swaync/launch.sh || mako
exec-once = hyprpaper
exec-once = command -v hypridle >/dev/null 2>&1 && hypridle
exec-once = command -v swayosd-server >/dev/null 2>&1 && swayosd-server -s ~/.config/swayosd/style.css
exec-once = easyeffects --service-mode --hide-window
exec-once = ~/.local/bin/polkit-agent-launch
exec-once = command -v koofr >/dev/null 2>&1 && koofr -silent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Disabled: on this setup ArgyllCMS `dispwin` talks to XRandR/Xwayland (:0.0),
# so it does not apply calibration to the actual Hyprland output.
# exec-once = ~/.local/bin/load-monitor-calibration

# exec-once = $terminal
# Installed and available via Walker; not part of the default tray workflow.
# exec-once = ~/.local/bin/gtk-dark-x11-exec nm-applet
# Disabled: Bluetooth workflow is handled directly via bluetui from Waybar.
# exec-once = command -v blueman-applet >/dev/null 2>&1 && ~/.local/bin/gtk-dark-x11-exec blueman-applet
# exec-once = $browser


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

xwayland {
    force_zero_scaling = true
}


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

general {
    gaps_in = 3
    gaps_out = 6

    border_size = 2

    col.active_border = rgba(234,231,219,0.87)
    col.inactive_border = rgba(66,58,62,0.8)

    # Set to true to enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
#    rounding = 1
#    rounding_power = 1

    active_opacity = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

# Keep the control center on the normal layer animation path.
# Disable compositor-level animation only for transient popup notifications.
layerrule = no_anim on, match:namespace ^swaync-notification-window$

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# Workspace placement is handled dynamically at login:
# - dual monitor: workspace 1 on DP-11, workspace 2 on eDP-1
# - laptop only: workspace 1 on eDP-1

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = false
    vrr = 2
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = it
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    resolve_binds_by_sym = true
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        scroll_factor = 0.2
        tap-to-click = true
        clickfinger_behavior = true
    }
}

# Swipe 3 fingers horizontally to change workspace
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# launcher / app principali
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, R, exec, $menu
bind = $mainMod ALT, SPACE, exec, $menu
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, $browser
bind = $mainMod SHIFT, P, exec, ~/.config/waybar/launch.sh
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod CTRL, T, exec, $terminal -e btop
bind = $mainMod, K, exec, $terminal -e sh -lc 'hyprctl binds | less -R'
bind = $mainMod, N, exec, command -v swaync-client >/dev/null 2>&1 && swaync-client -t -sw

# sessione
bind = $mainMod, ESCAPE, exec, command -v wlogout >/dev/null 2>&1 && wlogout || command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod CTRL, L, exec, command -v hyprlock >/dev/null 2>&1 && hyprlock || loginctl lock-session

# finestre / layout
bind = $mainMod, W, killactive,
bind = $mainMod, T, togglefloating,
bind = $mainMod, O, pin,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# focus finestre
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# scambio finestre
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# workspace
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod CTRL, TAB, workspace, previous

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# screenshot / recording con HyprCap

# Print = screenshot con menu coerente al tema del launcher
bind = , Print, exec, XDG_PICTURES_DIR="$HOME/Immagini" ~/.local/bin/screenshot-menu

# screenshot area diretto
bind = SHIFT, Print, exec, XDG_PICTURES_DIR="$HOME/Immagini" ~/.local/bin/screenshot-menu region

# screenshot finestra attiva diretto
bind = CTRL, Print, exec, XDG_PICTURES_DIR="$HOME/Immagini" ~/.local/bin/screenshot-menu window:active

# registrazione schermo
bind = SUPER, Print, exec, ~/.local/bin/screenrecord-toggle
bind = SUPER SHIFT, Print, exec, ~/.local/bin/screenrecord-region-toggle

# resize finestre
bind = $mainMod, equal, resizeactive, 40 0
bind = $mainMod, minus, resizeactive, -40 0
bind = $mainMod SHIFT, equal, resizeactive, 0 40
bind = $mainMod SHIFT, minus, resizeactive, 0 -40

# grouping
bind = $mainMod, G, togglegroup,
bind = $mainMod ALT, G, moveoutofgroup,
bind = $mainMod ALT, TAB, changegroupactive, f
bind = $mainMod ALT SHIFT, TAB, changegroupactive, b
bind = $mainMod ALT, left, moveintogroup, l
bind = $mainMod ALT, right, moveintogroup, r
bind = $mainMod ALT, up, moveintogroup, u
bind = $mainMod ALT, down, moveintogroup, d

# mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# multimediali
bindel = ,XF86AudioRaiseVolume, exec, ~/.local/bin/volume-osd up
bindel = ,XF86AudioLowerVolume, exec, ~/.local/bin/volume-osd down
bindel = ,XF86AudioMute, exec, ~/.local/bin/volume-osd mute
bindel = ,XF86AudioMicMute, exec, ~/.local/bin/volume-osd mic-mute
bindel = ,XF86MonBrightnessUp, exec, ~/.local/bin/brightness-osd up
bindel = ,XF86MonBrightnessDown, exec, ~/.local/bin/brightness-osd down

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
