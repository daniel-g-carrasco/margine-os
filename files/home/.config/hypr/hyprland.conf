# Margine Hyprland entrypoint
#
# Keep this file intentionally short.
# It only defines the include order for the real configuration fragments.
#
# Order matters:
# - monitor policy first
# - variables before anything that references them
# - look/input before binds and rules
#
# For the local operator guide and edit recipes, read:
#   ~/.config/hypr/README.md
#
# Hyprland wiki:
#   https://wiki.hypr.land/Configuring/Keywords/

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/conf.d/10-variables.conf
source = ~/.config/hypr/conf.d/20-autostart.conf
source = ~/.config/hypr/conf.d/30-environment.conf
source = ~/.config/hypr/conf.d/40-look-and-feel.conf
source = ~/.config/hypr/conf.d/50-input.conf
source = ~/.config/hypr/conf.d/60-binds-apps.conf
source = ~/.config/hypr/conf.d/61-binds-session.conf
source = ~/.config/hypr/conf.d/62-binds-windows.conf
source = ~/.config/hypr/conf.d/63-binds-workspaces.conf
source = ~/.config/hypr/conf.d/64-binds-media.conf
source = ~/.config/hypr/conf.d/70-rules.conf
