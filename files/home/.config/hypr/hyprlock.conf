shape {
    monitor =
    # @margine_accent_line_size
    size = 120, 2
    color = $accent
    rounding = 1

    # @margine_accent_line_position
    position = 0, -1.5%
    halign = center
    valign = center
}

# Margine renders this config through the margine-hyprlock wrapper.
# The wrapper scales fonts, widths, heights, and vertical gaps around the
# authentication block so the layout stays centered and proportionate.
label {
    monitor =
    text = $TIME
    color = $accent
    # @margine_time_font
    font_size = 96
    font_family = $font_ui
    text_align = center

    # @margine_time_position
    position = 0, 31%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] LC_TIME=it_IT.UTF-8 date +"%A %d %B %Y"
    color = $text_dim
    # @margine_date_font
    font_size = 20
    font_family = $font_ui
    text_align = center

    # @margine_date_position
    position = 0, 23%
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $text
    # @margine_user_font
    font_size = 22
    font_family = $font_ui
    text_align = center

    # @margine_user_position
    position = 0, 0.5%
    halign = center
    valign = center
}

