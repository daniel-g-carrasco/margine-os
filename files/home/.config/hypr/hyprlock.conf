$font_ui = IBM Plex Serif
$font_mono = IBM Plex Mono

# Palette allineata a swaync / waybar:
$accent = rgba(195,155,114,0.90)
$border = rgba(48,48,48,0.88)
$surface = rgba(26,26,26,0.78)
$surface_strong = rgba(18,18,18,0.84)
$text = rgba(232,230,227,0.96)
$text_dim = rgba(185,181,175,0.90)
$danger = rgba(190,83,76,0.94)
$shadow = rgba(000000cc)
$overlay = rgba(12,12,12,0.34)

general {
    hide_cursor = true
    immediate_render = true
    text_trim = true
    fail_timeout = 1200
}

auth {
    fingerprint {
        enabled = true
        ready_message = Appoggia il dito sul sensore
        present_message = Lettura impronta...
        retry_delay = 250
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = fadeIn, 1, 4, easeOutQuint
    animation = fadeOut, 1, 1.8, quick
    animation = inputFieldWidth, 1, 3, easeOutQuint
    animation = inputFieldColors, 1, 3, easeInOutCubic
    animation = inputFieldDots, 1, 2, quick
}

background {
    monitor =
    path = screenshot
    color = rgba(12,12,12,1.0)
    blur_passes = 4
    blur_size = 5
    noise = 0.0117
    contrast = 0.88
    brightness = 0.62
    vibrancy = 0.14
    vibrancy_darkness = 0.05
}

shape {
    monitor =
    size = 100%, 100%
    color = $overlay

    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

