input-field {
    monitor =
    # @margine_input_size
    size = 18%, 84
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color = $border
    inner_color = $surface_strong
    font_color = $text
    check_color = $accent
    fail_color = $danger
    capslock_color = $accent
    numlock_color = $border
    bothlock_color = $accent

    fade_on_empty = true
    rounding = 5
    font_family = $font_mono
    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL</i>

    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadow
    shadow_boost = 1.0

    # @margine_input_position
    position = 0, -7%
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = $accent
    # @margine_prompt_font
    font_size = 18
    font_family = $font_ui
    text_align = center
    zindex = 2

    # @margine_prompt_position
    position = 0, -16%
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTFAIL
    color = $danger
    # @margine_fail_font
    font_size = 16
    font_family = $font_ui
    text_align = center
    zindex = 1

    # @margine_fail_position
    position = 0, -14%
    halign = center
    valign = center
}

