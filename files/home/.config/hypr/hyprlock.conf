shape {
    monitor =
    size = 120, 2
    color = $accent
    rounding = 1

    position = 0, -26
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $accent
    font_size = 120
    font_family = $font_ui
    text_align = center

    position = 0, 500
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] LC_TIME=it_IT.UTF-8 date +"%A %d %B %Y"
    color = $text_dim
    font_size = 24
    font_family = $font_ui
    text_align = center

    position = 0, 375
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $text
    font_size = 24
    font_family = $font_ui
    text_align = center

    position = 0, 6
    halign = center
    valign = center
}

