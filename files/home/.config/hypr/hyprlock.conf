input-field {
    monitor =
    size = 600, 84
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color = $border
    inner_color = $surface_strong
    font_color = $text
    check_color = $accent
    fail_color = $danger
    capslock_color = $accent
    numlock_color = $border
    bothlock_color = $accent

    fade_on_empty = true
    rounding = 5
    font_family = $font_mono
    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL</i>

    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadow
    shadow_boost = 1.0

    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = $accent
    font_size = 18
    font_family = $font_ui
    text_align = center
    zindex = 2

    position = 0, -250
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTFAIL
    color = $danger
    font_size = 16
    font_family = $font_ui
    text_align = center
    zindex = 1

    position = 0, -220
    halign = center
    valign = center
}

