# @margine_hyprlock_font_ui
$font_ui = IBM Plex Mono
# @margine_hyprlock_font_mono
$font_mono = IBM Plex Mono

# Hyprlock source template
#
# Margine does not call `hyprlock` directly. The real entrypoint is the wrapper:
#   ~/.local/bin/margine-hyprlock
#
# The wrapper reads this file as a template, rewrites the `@margine_*` markers,
# and generates a runtime config sized for the currently focused monitor.
#
# Use this file for:
# - palette and static visual language
# - widget ordering
# - wrapper markers and anchor structure
#
# Use the wrapper for:
# - dynamic font scaling
# - dynamic input size and line width
# - dynamic vertical spacing and safe margins
#
# Wiki topic:
#   https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
# Palette aligned with swaync / waybar:
# The wrapper can rewrite this palette from `~/.config/margine/theme.env`.
# Keep the `@margine_*` markers intact so centralized theme updates keep
# working.
# @margine_hyprlock_accent
$accent = rgba(195,155,114,0.90)
# @margine_hyprlock_border
$border = rgba(48,48,48,0.88)
# @margine_hyprlock_surface
$surface = rgba(26,26,26,0.78)
# @margine_hyprlock_surface_strong
$surface_strong = rgba(18,18,18,0.84)
# @margine_hyprlock_text
$text = rgba(232,230,227,0.96)
# @margine_hyprlock_text_dim
$text_dim = rgba(185,181,175,0.90)
# @margine_hyprlock_danger
$danger = rgba(190,83,76,0.94)
# @margine_hyprlock_shadow
$shadow = rgba(000000cc)
# @margine_hyprlock_overlay
$overlay = rgba(12,12,12,0.34)

general {
    # Hide the cursor so the lockscreen reads like a single-purpose surface.
    hide_cursor = true
    # Render immediately instead of waiting for transitions to settle.
    immediate_render = true
    text_trim = true
    fail_timeout = 1200
}

auth {
    # Fingerprint remains enabled, but layout for its labels is controlled by
    # the wrapper-generated positions below.
    fingerprint {
        enabled = true
        ready_message = Appoggia il dito sul sensore
        present_message = Lettura impronta...
        retry_delay = 250
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = fadeIn, 1, 4, easeOutQuint
    animation = fadeOut, 1, 1.8, quick
    animation = inputFieldWidth, 1, 3, easeOutQuint
    animation = inputFieldColors, 1, 3, easeInOutCubic
    animation = inputFieldDots, 1, 2, quick
}

background {
    monitor =
    path = screenshot
    # @margine_hyprlock_background_color
    color = rgba(12,12,12,1.0)
    # @margine_hyprlock_blur_passes
    blur_passes = 4
    # @margine_hyprlock_blur_size
    blur_size = 5
    # @margine_hyprlock_noise
    noise = 0.0117
    # @margine_hyprlock_contrast
    contrast = 0.88
    # @margine_hyprlock_brightness
    brightness = 0.62
    # @margine_hyprlock_vibrancy
    vibrancy = 0.14
    # @margine_hyprlock_vibrancy_darkness
    vibrancy_darkness = 0.05
}

# Fullscreen tint layer above the blurred screenshot.
shape {
    monitor =
    size = 100%, 100%
    color = $overlay

    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

# Accent line anchored by the wrapper below the username label.
shape {
    monitor =
    # @margine_accent_line_size
    size = 120, 2
    color = $accent
    # @margine_hyprlock_shape_rounding
    rounding = 1

    # @margine_accent_line_position
    position = 0, -1.5%
    halign = center
    valign = center
}

# Top cluster driven by the wrapper. This stays near the safe upper margin.
# Margine renders this config through the margine-hyprlock wrapper.
# The wrapper scales fonts, widths, heights, and vertical gaps around the
# authentication block so the layout stays centered and proportionate.
label {
    monitor =
    text = $TIME
    color = $accent
    # @margine_time_font
    font_size = 96
    font_family = $font_ui
    text_align = center

    # @margine_time_position
    position = 0, 31%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] LC_TIME=it_IT.UTF-8 date +"%A %d %B %Y"
    color = $text_dim
    # @margine_date_font
    font_size = 20
    font_family = $font_ui
    text_align = center

    # @margine_date_position
    position = 0, 23%
    halign = center
    valign = center
}

# Authentication anchor cluster. The wrapper centers the username, accent line,
# and password field as the main reference block for the whole layout.
label {
    monitor =
    text = $USER
    color = $text
    # @margine_user_font
    font_size = 22
    font_family = $font_ui
    text_align = center

    # @margine_user_position
    position = 0, 0.5%
    halign = center
    valign = center
}

# Password input remains the geometric anchor used by the runtime generator.
input-field {
    monitor =
    # @margine_input_size
    size = 18%, 84
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1

    outer_color = $border
    inner_color = $surface_strong
    font_color = $text
    check_color = $accent
    fail_color = $danger
    capslock_color = $accent
    numlock_color = $border
    bothlock_color = $accent

    fade_on_empty = true
    # @margine_hyprlock_input_rounding
    rounding = 5
    font_family = $font_mono
    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL</i>

    shadow_passes = 2
    shadow_size = 4
    shadow_color = $shadow
    shadow_boost = 1.0

    # @margine_input_position
    position = 0, -7%
    halign = center
    valign = center
}

# Fingerprint feedback cluster. Prompt and failure labels are kept below the
# password field with explicit minimum spacing from each other.
label {
    monitor =
    text = $FPRINTPROMPT
    color = $accent
    # @margine_prompt_font
    font_size = 18
    font_family = $font_ui
    text_align = center
    zindex = 2

    # @margine_prompt_position
    position = 0, -16%
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTFAIL
    color = $danger
    # @margine_fail_font
    font_size = 16
    font_family = $font_ui
    text_align = center
    zindex = 1

    # @margine_fail_position
    position = 0, -14%
    halign = center
    valign = center
}
