# Monitor topology and scale policy
#
# Hyprland syntax reminder:
#   monitor = name, resolution, position, scale
#
# Useful commands:
# - `hyprctl monitors`
# - `hyprctl monitors all`
#
# Practical rules for this setup:
# - keep explicit monitor rules above the fallback rule
# - keep the fallback rule last
# - prefer connector names only when they are stable on the real machine
# - if connector naming becomes unstable, switch to `desc:...`
#
# `Margine v1` keeps compositor-level ICC disabled by default.
# Hyprland can load a per-monitor ICC profile, but we enable it only after
# validating the profile and the workflow on the real display.
# Example:
# monitor = eDP-1, preferred, 0x0, 2.0, icc, /home/USER/.local/share/icc/margine/FW13_140cd_D65_2.2_S.icc
#
# External outputs default to integer scaling in v1. Fractional compositor
# scaling is more likely to surface rendering defects with mixed Wayland /
# XWayland apps, dialogs, and VM frontends. On Daniel's setup, DP-11 is kept at
# 2.0 even when a smaller scale might look tempting.
#
# Internal panel anchored at the origin.
monitor = eDP-1, preferred, 0x0, 2.0

# Known external monitor placed automatically to the left, centered vertically.
monitor = DP-11, preferred, auto-center-left, 2.0

# Fallback for any other monitor not matched above.
# Keep this last so it does not shadow explicit rules.
monitor = , preferred, auto, auto
