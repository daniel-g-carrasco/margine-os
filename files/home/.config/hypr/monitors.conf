# `Margine v1` keeps compositor-level ICC disabled by default.
# Hyprland can load a per-monitor ICC profile, but we enable it only after
# validating the profile and the workflow on the real display.
# Example:
# monitor = eDP-1, preferred, 0x0, 2.0, icc, /home/USER/.local/share/icc/margine/FW13_140cd_D65_2.2_S.icc
# External outputs default to integer scaling in v1: fractional compositor
# scaling is too likely to surface rendering defects with mixed Wayland/XWayland
# apps, dialogs, and VM frontends. On Daniel's setup, DP-11 is kept at 2.0.
monitor = eDP-1, preferred, 0x0, 2.0
monitor = DP-11, preferred, auto-center-left, 2.0
monitor = , preferred, auto, 1.0
