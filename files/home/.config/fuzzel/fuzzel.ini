# Fuzzel fallback launcher and picker
#
# Walker remains the preferred launcher. Fuzzel is the official fallback and
# the shared dmenu-style picker for screenshot and recording helpers.
#
# Theme values are rendered from ~/.config/margine/theme.env into
# theme-generated.ini.

include=~/.config/fuzzel/theme-generated.ini

[main]
match-mode=fzf
show-actions=yes
fields=filename,name,generic,keywords,categories,comment
terminal=kitty -e {cmd}
layer=overlay
anchor=center
placeholder=Search apps, actions, and desktop entries
keyboard-focus=exclusive
exit-on-keyboard-focus-loss=yes
minimal-lines=yes

[dmenu]
exit-immediately-if-empty=yes
